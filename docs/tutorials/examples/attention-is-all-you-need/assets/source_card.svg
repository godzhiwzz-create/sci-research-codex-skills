<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="520" viewBox="0 0 1120 520" role="img" aria-labelledby="title desc">
  <title id="title">Attention Is All You Need source card</title>
  <desc id="desc">A public demo source card for the paper Attention Is All You Need.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#162033"/>
      <stop offset="58%" stop-color="#233a58"/>
      <stop offset="100%" stop-color="#5b6d8b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000" flood-opacity=".25"/>
    </filter>
  </defs>
  <rect width="1120" height="520" rx="28" fill="url(#bg)"/>
  <circle cx="980" cy="92" r="180" fill="#7dd3fc" opacity=".12"/>
  <circle cx="110" cy="448" r="160" fill="#fbbf24" opacity=".11"/>
  <g filter="url(#shadow)">
    <rect x="72" y="70" width="976" height="380" rx="24" fill="#ffffff"/>
  </g>
  <text x="112" y="134" font-family="Arial, 'Noto Sans SC', sans-serif" font-size="44" font-weight="800" fill="#111827">Attention Is All You Need</text>
  <text x="112" y="180" font-family="Arial, 'Noto Sans SC', sans-serif" font-size="24" fill="#475569">用注意力机制替代循环和卷积的序列建模架构</text>
  <line x1="112" y1="214" x2="1008" y2="214" stroke="#e5e7eb" stroke-width="2"/>
  <text x="112" y="264" font-family="Arial, 'Noto Sans SC', sans-serif" font-size="23" font-weight="700" fill="#1f2937">Authors</text>
  <text x="250" y="254" font-family="Arial, 'Noto Sans SC', sans-serif" font-size="20" fill="#334155">
    <tspan x="250" dy="0">Ashish Vaswani, Noam Shazeer, Niki Parmar, Jakob Uszkoreit, Llion Jones,</tspan>
    <tspan x="250" dy="28">Aidan N. Gomez, Lukasz Kaiser, Illia Polosukhin</tspan>
  </text>
  <text x="112" y="325" font-family="Arial, 'Noto Sans SC', sans-serif" font-size="23" font-weight="700" fill="#1f2937">Venue</text>
  <text x="250" y="325" font-family="Arial, 'Noto Sans SC', sans-serif" font-size="22" fill="#334155">NeurIPS 2017 / Advances in Neural Information Processing Systems 30</text>
  <text x="112" y="376" font-family="Arial, 'Noto Sans SC', sans-serif" font-size="23" font-weight="700" fill="#1f2937">Source</text>
  <text x="250" y="376" font-family="Arial, 'Noto Sans SC', sans-serif" font-size="22" fill="#334155">arXiv:1706.03762v7 · published 2017-06-12 · updated 2023-08-02</text>
  <text x="112" y="420" font-family="Arial, 'Noto Sans SC', sans-serif" font-size="18" fill="#64748b">
    <tspan x="112" dy="0">Public demo note: this visual packet uses paraphrased reading notes and assistant-drawn diagrams</tspan>
    <tspan x="112" dy="24">instead of reproducing long abstract text.</tspan>
  </text>
</svg>
