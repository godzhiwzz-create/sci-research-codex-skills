<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="660" viewBox="0 0 1180 660" role="img" aria-labelledby="title desc">
  <title id="title">Scaled dot-product attention and multi-head attention</title>
  <desc id="desc">A simplified explanation diagram for scaled dot-product attention and multi-head attention.</desc>
  <defs>
    <style>
      .title{font:700 30px Arial, sans-serif;fill:#0f172a}
      .sub{font:18px Arial, sans-serif;fill:#475569}
      .box{fill:#fff;stroke:#cbd5e1;stroke-width:2}
      .blue{fill:#dbeafe;stroke:#93c5fd}
      .yellow{fill:#fef3c7;stroke:#facc15}
      .green{fill:#dcfce7;stroke:#86efac}
      .txt{font:19px Arial, sans-serif;fill:#1e293b}
      .small{font:15px Arial, sans-serif;fill:#475569}
      .arrow{stroke:#2563eb;stroke-width:3;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/>
    </marker>
  </defs>
  <rect width="1180" height="660" rx="28" fill="#f8fafc"/>
  <text x="60" y="58" class="title">注意力在做什么：把“该看谁”变成可学习的权重</text>
  <text x="60" y="90" class="sub">Query 问问题，Key 提供可匹配的索引，Value 是被加权汇总的信息。</text>
  <rect x="70" y="145" width="500" height="410" rx="24" class="box"/>
  <text x="105" y="190" class="title" font-size="24">Scaled Dot-Product Attention</text>
  <rect x="125" y="240" width="105" height="70" rx="14" class="blue"/>
  <text x="158" y="282" class="txt">Q</text>
  <rect x="125" y="350" width="105" height="70" rx="14" class="yellow"/>
  <text x="159" y="392" class="txt">K</text>
  <rect x="370" y="295" width="135" height="70" rx="14" class="green"/>
  <text x="389" y="337" class="txt">QKᵀ / √dₖ</text>
  <path d="M230 275 C292 275 310 312 370 320" class="arrow"/>
  <path d="M230 385 C292 385 310 348 370 340" class="arrow"/>
  <rect x="370" y="420" width="135" height="70" rx="14" class="blue"/>
  <text x="400" y="462" class="txt">softmax</text>
  <path d="M438 365 L438 420" class="arrow"/>
  <rect x="125" y="485" width="105" height="50" rx="14" class="green"/>
  <text x="160" y="517" class="txt">V</text>
  <path d="M370 455 C305 455 280 507 230 510" class="arrow"/>
  <text x="112" y="598" class="small">输出 = softmax(QKᵀ / √dₖ) V。缩放项让点积数值更稳定，softmax 把匹配程度变成权重。</text>
  <rect x="650" y="145" width="460" height="410" rx="24" class="box"/>
  <text x="685" y="190" class="title" font-size="24">Multi-Head Attention</text>
  <text x="685" y="226" class="sub">不是只学一种关系，而是并行学多种“看法”。</text>
  <rect x="715" y="270" width="120" height="70" rx="14" class="blue"/>
  <text x="744" y="312" class="txt">Head 1</text>
  <rect x="855" y="270" width="120" height="70" rx="14" class="yellow"/>
  <text x="884" y="312" class="txt">Head 2</text>
  <rect x="995" y="270" width="80" height="70" rx="14" class="green"/>
  <text x="1018" y="312" class="txt">...</text>
  <rect x="770" y="405" width="250" height="70" rx="14" class="box"/>
  <text x="825" y="448" class="txt">Concat + linear projection</text>
  <path d="M775 340 L842 405" class="arrow"/>
  <path d="M915 340 L905 405" class="arrow"/>
  <path d="M1035 340 L970 405" class="arrow"/>
  <text x="695" y="598" class="small">直观理解：一个 head 可能关注句法依赖，另一个关注词义对应，多个 head 汇总后得到更丰富的上下文表示。</text>
</svg>
